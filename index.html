<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <title>Quicklist</title>
</head>
<body>
    <header>
        <img src="./img/logo.png" alt="Logo do Quicklist">
    </header>

    <main>
        <section class="adicionar-item">
            <h1>Compras da semana</h1>

            <div>
                <input type="text" placeholder="Adicione um novo item" id="novo-item">
                <button>Adicionar item</button>
            </div>
        </section>

        <section class="itens">
            <div class="item">
                <div>
                    <input type="checkbox" id="item1">
                    <label for="item1">Pão de Forma</label>
                </div>

                <button>
                    <img src="./img/button.png" alt="">
                </button>
            </div>
            <div class="item">
                <div>
                    <input type="checkbox" id="item2">
                    <label for="item1">Café preto</label>
                </div>

                <button>
                    <img src="./img/button.png" alt="">
                </button>
            </div>
            <div class="item">
                <div>
                    <input type="checkbox" id="item3">
                    <label for="item1">Suco de laranja</label>
                </div>

                <button>
                    <img src="./img/button.png" alt="icone da lixeira">
                </button>
            </div>
        </section>
    </main>
</body>
</html>
